<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swedish Craft Beverage Map</title>
  <meta name="description" content="Learn more about the Swedish alcohol products being served tonight — every bottle mapped to the vineyard or brewery it came from.">
  <meta name="theme-color" content="#f0e6d2">

  <!-- A Material Symbols wine glass, fetched at load. Iconify serves the icon with a colour
       parameter, so it wears the map's own herb green rather than default black — a mid tone,
       which keeps it legible on both light and dark browser tabs. -->
  <link rel="icon" type="image/svg+xml"
        href="https://api.iconify.design/material-symbols/wine-bar.svg?color=%236e9a6e&width=64&height=64">

  <!-- Share cards. The image is the direct file, not the share.google link it came from — that
       link serves an HTML results page, which a scraper can't render as a picture. It's hosted
       on scanmagazine.co.uk, so it's outside our control: if the preview ever goes blank, that
       file has moved and wants re-hosting alongside this page. -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://mattfalco.com/Falco-Wedding/wedding-alcohol.html">
  <meta property="og:site_name" content="Swedish Craft Beverages">
  <meta property="og:title" content="Swedish Craft Beverages">
  <meta property="og:description" content="Learn more about the Swedish alcohol products being served tonight — every bottle mapped to the vineyard or brewery it came from.">
  <meta property="og:locale" content="en_GB">
  <meta property="og:image" content="https://scanmagazine.co.uk/content/uploads/2020/02/3-Nyn%C3%A4shamns.jpg">
  <meta property="og:image:width" content="950">
  <meta property="og:image:height" content="561">
  <meta property="og:image:alt" content="A glass of Nynäshamns beer poured beside a bottle of Bedarö Bitter on a bar top.">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Swedish Craft Beverages">
  <meta name="twitter:description" content="Learn more about the Swedish alcohol products being served tonight — every bottle mapped to the vineyard or brewery it came from.">
  <meta name="twitter:image" content="https://scanmagazine.co.uk/content/uploads/2020/02/3-Nyn%C3%A4shamns.jpg">
  <meta name="twitter:image:alt" content="A glass of Nynäshamns beer poured beside a bottle of Bedarö Bitter on a bar top.">

  <!-- Explicit https, never protocol-relative: served from a plain-http host (a Home Assistant
       box, say) a "//" URL inherits http, and jsdelivr answers that with a 301 to https. Desktop
       browsers follow it; iOS blocks the insecure hop before the redirect lands, so the library
       never arrives and the map never starts. -->
  <script src="https://cdn.jsdelivr.net/npm/globe.gl"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Midsummer garden: linen table, duck-egg water, a quilt of four pastels */
      --linen: #f0e6d2;
      --linen-deep: #ddcfb2;
      --sea: #cfe4ec;
      --ink: #3a4a3d;
      --muted: #7b8874;
      --hairline: rgba(58, 74, 61, 0.14);
      --paper: #fffdf8;
      --display: "Cormorant Garamond", Georgia, serif;
      --body: "Karla", ui-sans-serif, system-ui, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      overflow: hidden;
      font-family: var(--body);
      color: var(--ink);
      background:
        radial-gradient(120% 90% at 50% 0%, #f7f0e2 0%, var(--linen) 45%, var(--linen-deep) 100%);
    }

    #globeViz {
      position: absolute;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }

    .overlay {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px;
      pointer-events: none;
    }

    /* --- Panels: pressed-linen cards --- */
    .card {
      background: rgba(255, 253, 248, 0.88);
      backdrop-filter: blur(8px);
      border: 1px solid var(--hairline);
      border-radius: 14px;
      box-shadow: 0 10px 30px -18px rgba(58, 74, 61, 0.5);
      pointer-events: auto;
    }

    header.card {
      max-width: 27rem;
      padding: 18px 20px;
    }
    header h1 {
      margin: 0;
      font-family: var(--display);
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      line-height: 1.15;
    }
    header p {
      margin: 6px 0 0;
      font-size: 0.78rem;
      line-height: 1.5;
      color: var(--muted);
    }

    /* --- Jump bar --- */
    .jump {
      align-self: center;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      padding: 8px 10px;
      border-radius: 999px;
    }
    .jump-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 0 6px;
    }
    .chip {
      font-family: var(--body);
      font-size: 0.74rem;
      font-weight: 500;
      color: var(--ink);
      background: var(--tint);
      border: 1px solid var(--edge);
      border-radius: 999px;
      padding: 5px 12px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .chip:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 14px -8px rgba(58, 74, 61, 0.7);
    }
    .chip:focus-visible,
    .close:focus-visible,
    .pin-card:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }

    /* --- Sidebar --- */
    #infoSidebar {
      position: absolute;
      top: 22px;
      right: 22px;
      width: min(26rem, calc(100vw - 44px));
      max-height: calc(100vh - 44px);
      padding: 22px;
      overflow-y: auto;
    }
    #infoSidebar.hidden { display: none; }
    .close {
      position: absolute;
      top: 14px;
      right: 16px;
      border: 0;
      background: none;
      font-size: 1.05rem;
      line-height: 1;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
    }
    .close:hover { color: var(--ink); }

    .producer-name {
      font-family: var(--display);
      font-size: 1.75rem;
      font-weight: 600;
      margin: 0 26px 0 0;
      line-height: 1.1;
    }
    .producer-place {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--seal);
      margin: 5px 0 0;
    }
    .link {
      display: inline-block;
      margin-top: 8px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1px solid var(--hairline);
      padding-bottom: 1px;
      transition: border-color 0.15s ease;
    }
    .link:hover { border-color: var(--ink); }

    .rule {
      height: 1px;
      background: var(--hairline);
      margin: 16px 0;
      border: 0;
    }

    .product {
      display: flex;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--hairline);
    }
    .product:last-child { border-bottom: 0; }
    /* Only when there's a range to choose from — see showSidebarFor. */
    .product.selectable {
      cursor: pointer;
      border-radius: 8px;
      transition: background 0.15s ease;
    }
    .product.selectable:hover { background: rgba(255, 255, 255, 0.55); }
    .product.selectable:focus-visible {
      outline: 2px solid var(--ink);
      outline-offset: 2px;
    }
    .product.is-active {
      background: rgba(255, 255, 255, 0.75);
      box-shadow: inset 3px 0 0 var(--seal);
      border-radius: 0 8px 8px 0;
      padding-left: 12px;
      margin-left: -12px;
    }
    .product img {
      width: 46px;
      height: 84px;
      object-fit: contain;
      flex-shrink: 0;
    }
    .product-body { min-width: 0; flex: 1; }
    .kind {
      display: inline-block;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--tint);
      border-radius: 999px;
      padding: 3px 8px;
      margin-bottom: 6px;
    }
    .product h3 {
      font-family: var(--display);
      font-size: 1.2rem;
      font-weight: 600;
      margin: 0;
      line-height: 1.2;
    }
    .facts {
      display: flex;
      gap: 10px;
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--seal);
      margin-top: 3px;
    }
    .taste {
      font-family: var(--display);
      font-style: italic;
      font-size: 1rem;
      line-height: 1.45;
      color: var(--ink);
      margin: 8px 0 0;
    }
    .meta {
      font-size: 0.68rem;
      line-height: 1.55;
      color: var(--muted);
      margin-top: 7px;
    }
    .meta b { color: var(--ink); font-weight: 700; }

    /* --- Garden markers: bottles thrown clear of the country on a leader --- */
    .pin {
      /* A zero-size anchor. The globe drops this exactly on the coordinate and every part of
         the marker is laid out around it, so nothing but the visible card and stake can take
         a click — a label can never swallow its neighbour's. */
      width: 0;
      height: 0;
      cursor: pointer;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .pin:hover { z-index: 50; }
    .pin-card,
    .pin-dot { pointer-events: auto; }
    .pin.is-hidden,
    .pin.is-hidden .pin-card,
    .pin.is-hidden .pin-dot { pointer-events: none; }

    /* Marker container, anchored on the stake. Size and spread are deliberately NOT tied to
       one scale here: placeMarkers() drives the leader length / card offset (--r, --dx, --dy)
       by an aggressive spread factor and the card size (--ksize) by a gentle one. So zooming
       into a county throws the bottles outward faster than the map grows while the bottles
       themselves grow slowly — the county stays readable instead of being buried. */
    .pin-scale {
      position: absolute;
      left: 0;
      top: 0;
    }
    .leader {
      position: absolute;
      left: 0;
      top: 0;
      width: var(--r, 70px);        /* full spread distance in px, set per-frame */
      height: 1.5px;
      margin-top: -0.75px;
      background: var(--c);
      opacity: 0.6;
      transform-origin: 0 50%;
      transform: rotate(var(--a, 0deg));
    }
    .pin-card {
      position: absolute;
      left: 0;
      top: 0;
      /* Centre on the stake, shift out to the fanned point, then scale about the card centre. */
      transform: translate(-50%, -50%) translate(var(--dx, 0px), var(--dy, 0px)) scale(var(--ksize, 1));
      background: var(--paper);
      border: 1.5px solid var(--c);
      border-radius: 9px;
      padding: 5px 5px 4px;
      box-shadow: 0 6px 14px -8px rgba(58, 74, 61, 0.85);
      /* Only the shadow transitions: the offset updates as the camera moves, and animating
         that would make every label swim behind the map. */
      transition: box-shadow 0.18s ease;
    }
    .pin:hover .pin-card {
      transform: translate(-50%, -50%) translate(var(--dx, 0px), var(--dy, 0px)) scale(calc(var(--ksize, 1) * 1.12));
      box-shadow: 0 10px 22px -8px rgba(58, 74, 61, 0.9);
    }
    .pin-card img {
      display: block;
      width: 24px;
      height: 40px;
      object-fit: contain;
    }
    .pin-dot {
      position: absolute;
      left: 0;
      top: 0;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--paper);
      border: 1.5px solid var(--c);
      transform: translate(-50%, -50%);
    }
    /* The selected bottle, whichever way it was picked. A white halo was invisible against the
       pale sea, so ring it in ink: the one dark accent on the map reads instantly. */
    .pin.is-active .pin-card {
      box-shadow: 0 0 0 2px var(--paper), 0 0 0 3.5px var(--ink), 0 8px 20px -8px rgba(58, 74, 61, 0.95);
    }

    /* --- Home: the reference point, sat on its own spot --- */
    .home-mark {
      position: absolute;
      left: 0;
      top: 0;
      /* Centred on the coordinate itself, and riding the same gentle zoom curve as the bottles. */
      transform: translate(-50%, -50%) scale(var(--ksize, 1));
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--paper);
      border: 1.5px solid var(--ink);
      box-shadow: 0 4px 10px -5px rgba(58, 74, 61, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
    }
    .home-mark svg {
      width: 15px;
      height: 15px;
      fill: none;
      stroke: var(--ink);
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .home-label {
      position: absolute;
      left: 0;
      top: 0;
      transform: translate(-50%, calc(14px * var(--ksize, 1))) scale(var(--ksize, 1));
      font-family: var(--display);
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      text-shadow: 0 1px 0 var(--paper), 0 0 4px var(--paper), 0 0 8px var(--paper);
      pointer-events: none;
    }

    .map-error {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
      text-align: center;
      font-family: var(--display);
      font-size: 1.15rem;
      line-height: 1.5;
      color: var(--muted);
    }

    /* Tooltip */
    .lan-tip {
      font-family: var(--body);
      background: var(--paper);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      padding: 8px 12px;
      box-shadow: 0 10px 26px -16px rgba(58, 74, 61, 0.8);
      color: var(--ink);
    }
    .lan-tip strong {
      font-family: var(--display);
      font-size: 1.05rem;
      font-weight: 600;
      display: block;
    }
    .lan-tip span {
      font-size: 0.68rem;
      color: var(--muted);
    }

    ::-webkit-scrollbar { width: 7px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: rgba(58, 74, 61, 0.18);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(58, 74, 61, 0.32); }

    /* Back to the menu. It lives inside header.card rather than as a fourth overlay child —
       the overlay is a space-between column of exactly three (header, sidebar, jump bar), and
       a fourth would redistribute all of them. */
    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 11px;
      padding: 5px 12px;
      background: var(--linen);
      border: 1px solid var(--hairline);
      border-radius: 999px;
      color: var(--muted);
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease, color 0.15s ease;
    }
    .home-btn:hover,
    .home-btn:focus-visible {
      transform: translateY(-1px);
      color: var(--ink);
      box-shadow: 0 6px 14px -8px rgba(58, 74, 61, 0.7);
    }

    @media (max-width: 720px) {
      .overlay { padding: 12px; }
      /* Sits above the jump bar rather than under it — the sheet and the chips share
         the bottom edge on narrow screens. */
      #infoSidebar {
        top: auto;
        bottom: 92px;
        right: 12px;
        left: 12px;
        width: auto;
        max-height: 54vh;
      }
      header h1 { font-size: 1.4rem; }
    }

    /* Landscape phone: short and narrow. The bottom sheet at 54vh would slide up under the
       header and clip its own content. Compact the header and pin the sheet between the
       header and the jump bar, so it always sits clear and scrolls internally instead. */
    @media (max-width: 720px) and (max-height: 520px) {
      header.card { padding: 9px 14px; }
      header h1 { font-size: 1.05rem; }
      header p { display: none; }        /* supplementary — the title still carries the page */
      .home-btn { margin-bottom: 6px; padding: 3px 10px; }
      #infoSidebar {
        top: 60px;
        bottom: 88px;
        max-height: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; }
    }
  </style>
</head>
<body>

  <div id="globeViz"></div>

  <div class="overlay">
    <header class="card">
      <a class="home-btn" href="./"><span aria-hidden="true">←</span> All pages</a>
      <h1>🇸🇪 Swedish Craft Beverages</h1>
      <p>Learn more about the Swedish alcohol products being served tonight</p>
    </header>

    <div id="infoSidebar" class="card hidden">

      <div id="sidebarContent"></div>

    <footer class="jump card">
      <span class="jump-label">Jump to</span>
      <button class="chip" style="--tint:#eaf1e4; --edge:#6e9a6e" onclick="focusProducer('Nynäshamns Ångbryggeri')">Nynäshamn</button>
      <button class="chip" style="--tint:#e4eef1; --edge:#5f9aa8" onclick="focusProducer('Arilds Vingård')">Arild</button>
      <button class="chip" style="--tint:#f6e8ea; --edge:#b05f6b" onclick="focusProducer('Hällåkra Vingård')">Hällåkra</button>

      <button class="chip" style="--tint:#f7ecf1; --edge:#b4708f" onclick="focusProducer('IDUNN Norsjö Wine & Co')">Norsjö</button>
    </footer>
  </div>

            url: "https://www.systembolaget.se/produkt/vin/sos-557801/",
            taste: "Fruity, slightly spicy and bitter flavor with sweetness and a distinct character of bitter orange.",
            suitable: "Aperitif",
            allergens: "Sulfites"
          }
        ]
      },
      {
        producer: "Kiviks Musteri",
        lat: 55.6836,
        lng: 14.2261,
        city: "Kivik",
        county: "Skåne County",
        website: "https://www.kiviksmusteri.se/",
        color: "#94a85a",
        products: [
          {
            name: "Kiviks Ekologisk Äppelcider Torr",
            category: "Cider, Dry Apple",
            price: "21.00 SEK",
            volume: "330 ml",
            abv: "4.5%",
            imageUrl: "https://product-cdn.systembolaget.se/productimages/1038114/1038114_400.png",
            url: "https://www.systembolaget.se/produkt/cider-blanddrycker/kiviks-ekologisk-appelcider-181403/",
            taste: "Fruity flavor with notes of green apples, pear, and citrus.",
            suitable: "Aperitif, Chicken dishes, Salads",
            allergens: "Sulfites"
          }
        ]
      }
    ];

    const SEA = '#cfe4ec';
    const LAND = '#e4e6d0';   // countries beyond Sweden: quiet linen, so the quilt reads first
    // Everything that must agree with the geography underneath — the counties and the
    // stakes — is pinned to this one height. Raising anything higher throws it off its
    // real spot: at 0.07 the Skåne stakes rendered ~55px out to sea.
    const SURFACE = 0.006;

    // The quilt. Index = the data's four-colour value, so touching län never match.
    const QUILT = {
      1: { calm: '#cfe0c6', deep: '#a9c79c' },  // sage
      2: { calm: '#f3d6da', deep: '#e5aeb8' },  // blush
      3: { calm: '#d3e3f2', deep: '#a9c7e4' },  // sky
      4: { calm: '#f6e8c2', deep: '#ead38b' }   // butter
    };

    const countyKey = name => name.replace(/ County$/, '');
    const producingCounties = new Set(mapData.map(d => countyKey(d.county)));
    const producersIn = name => mapData.filter(d => countyKey(d.county) === name);
    const quilt = f => QUILT[f.properties.c] || QUILT[1];

    // Sweden's national outline, derived from the county quilt itself so it lines up exactly.
    // An edge shared by two counties is internal; an edge belonging to just one is on the
    // coastline or land border. Collect those single-use edges and chain them into loops —
    // one big mainland ring plus Gotland, Öland and the archipelago islands. Drawn darker and
    // just above the fill, this reads as a border around the whole country while the interior
    // county lines stay pale.
    function nationalOutline(features) {
      const pk = p => p[0] + ',' + p[1];
      const eKey = (a, b) => (a < b ? a + ';' + b : b + ';' + a);
      const count = new Map();
      const rings = [];
      features.forEach(f => {
        const polys = f.geometry.type === 'Polygon' ? [f.geometry.coordinates] : f.geometry.coordinates;
        polys.forEach(poly => rings.push(poly[0]));   // exterior ring of each part
      });
      rings.forEach(ring => {
        for (let i = 0; i < ring.length - 1; i++) {
          const k = eKey(pk(ring[i]), pk(ring[i + 1]));
          count.set(k, (count.get(k) || 0) + 1);
        }
      });
      const adj = new Map(), coord = new Map();
      const link = (a, b) => { (adj.get(a) || adj.set(a, []).get(a)).push(b); };
      rings.forEach(ring => {
        for (let i = 0; i < ring.length - 1; i++) {
          const A = ring[i], B = ring[i + 1], a = pk(A), b = pk(B);
          if (count.get(eKey(a, b)) === 1) {
            coord.set(a, A); coord.set(b, B);
            link(a, b); link(b, a);
          }
        }
      });
      const used = new Set(), paths = [];
      for (const start of adj.keys()) {
        while (adj.get(start).some(n => !used.has(eKey(start, n)))) {
          const path = [];
          let node = start;
          path.push(coord.get(node));
          while (true) {
            const next = adj.get(node).find(n => !used.has(eKey(node, n)));
            if (!next) break;
            used.add(eKey(node, next));
            path.push(coord.get(next));
            node = next;
            if (node === start) break;
          }
          if (path.length > 1) paths.push(path.map(p => [p[1], p[0]]));   // [lat, lng]
        }
      }
      return paths;
    }
    const SWEDEN_OUTLINE = nationalOutline(SWEDEN_LAN.features);

    // Every bottle sits just off its own coast, on the shortest leader that reaches water.
    //
    // The heading is found by asking the map, not by guessing: cast rays from the producer and
    // take the one that leaves Sweden soonest and has the least land along it. That keeps each
    // label hard against its own län, keeps the leader off the quilt, and — since every
    // producer heads for its nearest shore — rings the bottles naturally around the coast.
    // Aiming "away from the county centre" instead ignored where the water actually is and
    // dragged leaders across the country.
    // Bottles from one producer belong together, so they ride out on a single shared leader and
    // pack into a small cluster at the end of it. Fanning them across a wide arc instead read as
    // four unrelated pins scattered over the Baltic rather than one brewery's range.
    const CELL_W = 43;          // one bottle's slot in the cluster grid (card + gap)
    const CELL_H = 58;
    const GAP = 8;              // breathing room between the coast and the cluster's edge

    // A fixed reference point, to read the rest of the map against.
    const HOME = { lat: 59.1041, lng: 18.0141, label: 'Tungelsta' };

    // Ray-casting point-in-country, with a bounding box round each län so a miss costs nothing.
    const LAN_BOXES = SWEDEN_LAN.features.map(f => {
      const polys = f.geometry.type === 'Polygon' ? [f.geometry.coordinates] : f.geometry.coordinates;
      const rings = polys.map(p => p[0]);
      let x0 = 180, y0 = 90, x1 = -180, y1 = -90;
      rings.forEach(r => r.forEach(([lng, lat]) => {
        if (lng < x0) x0 = lng; if (lng > x1) x1 = lng;
        if (lat < y0) y0 = lat; if (lat > y1) y1 = lat;
      }));
      return { x0, y0, x1, y1, rings };
    });
    const inRing = (lng, lat, ring) => {
      let inside = false;
      for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
        const [xi, yi] = ring[i], [xj, yj] = ring[j];
        if ((yi > lat) !== (yj > lat) && lng < ((xj - xi) * (lat - yi)) / (yj - yi) + xi) inside = !inside;
      }
      return inside;
    };
    const onLand = (lng, lat) => LAN_BOXES.some(b =>
      lng >= b.x0 && lng <= b.x1 && lat >= b.y0 && lat <= b.y1 && b.rings.some(r => inRing(lng, lat, r)));

    // The shortest way out to open water. BUFFER stops a ray "escaping" through a narrow
    // strait it would immediately re-enter — without it, Håks Gård would hop the Kalmarsund
    // and land back on the mainland.
    const RAYS = 72, RAY_STEP = 0.04, RAY_MAX = 3.0, BUFFER = 0.4;
    function escapeHeading(producer) {
      let best = null;
      for (let i = 0; i < RAYS; i++) {
        const a = (2 * Math.PI * i) / RAYS;
        const vx = Math.cos(a), vy = Math.sin(a);
        let clear = null, land = 0;
        for (let d = 0; d <= RAY_MAX; d += RAY_STEP) {
          const lat = producer.lat + vy * d;
          const lng = producer.lng + (vx * d) / Math.cos((lat * Math.PI) / 180);
          if (onLand(lng, lat)) { land++; if (clear !== null && d - clear < BUFFER) clear = null; }
          else if (clear === null) clear = d;
        }
        if (clear === null) continue;
        // Nearest water wins; ties go to the ray with the least land under it (the open sea).
        if (!best || clear < best.clear - 1e-9 || (Math.abs(clear - best.clear) < 1e-9 && land < best.land)) {
          best = { x: vx, y: vy, clear, land };
        }
      }
      return best || { x: 0, y: -1, clear: 0.5, land: 0 };
    }

    // One pin per product. A producer's bottles share a stake, a heading and a leader, and
    // differ only by their slot in the cluster grid — squarish, so four beers read as a block
    // rather than a line: 1 stays single, 2 sit side by side, 4 make a 2x2.
    const pinData = [];
    const clusters = mapData.map(producer => {
      const esc = escapeHeading(producer);
      const dir = { x: esc.x, y: esc.y };
      const n = producer.products.length;
      const cols = Math.ceil(Math.sqrt(n));
      const rows = Math.ceil(n / cols);
      const pins = producer.products.map((product, i) => {
        const row = Math.floor(i / cols);
        const col = i % cols;
        const inRow = Math.min(cols, n - row * cols);   // centre a short last row
        const pin = {
          lat: producer.lat,
          lng: producer.lng,
          product,
          producer,
          gx: (col - (inRow - 1) / 2) * CELL_W,   // slot offset from the cluster's centre
          gy: (row - (rows - 1) / 2) * CELL_H,
          isLead: i === 0                          // only this one draws the shared leader
        };
        pinData.push(pin);
        return pin;
      });
      return {
        producer, pins, dir,
        lat: producer.lat,
        lng: producer.lng,
        clearDeg: esc.clear,     // how far to open water along that heading
        extraLead: 0,            // only what the collision resolver had to add
        nudge: 0,
        boxW: cols * CELL_W,     // the whole cluster's footprint, for collision checks
        boxH: rows * CELL_H
      };
    });

    // Added after the clusters are built, so it never joins the fan-out: no heading, no leader,
    // no grid slot. It just marks the spot.
    const homePin = { lat: HOME.lat, lng: HOME.lng, isHome: true };
    pinData.push(homePin);

    let hoveredLan = null;

    const globe = Globe()(document.getElementById('globeViz'))
      .backgroundColor('rgba(0,0,0,0)')   // let the linen gradient behind the canvas show
      .showAtmosphere(true)
      .atmosphereColor('#f0d9df')         // blush haze, like evening light through a hedge
      .atmosphereAltitude(0.18)

      .polygonsData(SWEDEN_LAN.features)
      // Sit the quilt just clear of the sphere — enough to beat z-fighting, no more. Height
      // costs accuracy under perspective: anything lifted off the surface is projected away
      // from the centre of the view, so a raised county slides off the coastline beneath it.
      // Hovering deepens the colour instead of lifting, which would slide it sideways.
      .polygonAltitude(() => SURFACE)
      .polygonCapColor(f => {
        const q = quilt(f);
        if (f === hoveredLan) return q.deep;
        return producingCounties.has(f.properties.name) ? q.deep : q.calm;
      })
      .polygonSideColor(f => quilt(f).deep)
      .polygonStrokeColor(() => '#fffdf8')
      .polygonsTransitionDuration(200)
      .polygonLabel(f => {
        const here = producersIn(f.properties.name);
        return `<div class="lan-tip">
                  <strong>${f.properties.name} län</strong>
                  <span>${here.length ? here.map(p => p.producer).join(' · ') : 'No producers tonight'}</span>
                </div>`;
      })
      .onPolygonHover(f => {
        hoveredLan = f;
        globe.polygonCapColor(globe.polygonCapColor());
      })

      // Dark national border, sitting a hair above the quilt so it draws on top of the pale
      // interior county lines.
      .pathsData(SWEDEN_OUTLINE)
      .pathPoints(d => d)
      .pathPointLat(p => p[0])
      .pathPointLng(p => p[1])
      .pathPointAlt(SURFACE + 0.0015)
      .pathColor(() => '#2c3a2f')
      .pathStroke(0.7)
      .pathTransitionDuration(0)

      .htmlElementsData(pinData)
      .htmlLat('lat')
      .htmlLng('lng')
      .htmlAltitude(SURFACE)   // same height as the quilt, so stakes land on their county
      .htmlElementVisibilityModifier((el, isVisible) => {
        // Hide markers round the back of the globe. Pointer-events go through the .is-hidden
        // class, not inline styles, which would override the CSS rules above.
        el.style.opacity = isVisible ? 1 : 0;
        el.classList.toggle('is-hidden', !isVisible);
      })
      .htmlElement(d => {
        if (d.isHome) {
          // The one marker that stays put: it's the reference point, so it sits on its own spot
          // with no leader and nothing to fan out to.
          const el = document.createElement('div');
          el.className = 'pin home';
          el.title = `${HOME.label} — home`;
          el.innerHTML = `
            <div class="pin-scale">
              <div class="home-mark">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 10.4 12 3l9 7.4" />
                  <path d="M5.6 9.4V20h12.8V9.4" />
                  <path d="M10 20v-5.4h4V20" />
                </svg>
              </div>
              <div class="home-label">${HOME.label}</div>
            </div>`;
          d.el = el;
          return el;
        }
        const el = document.createElement('div');
        el.className = 'pin';
        el.title = `${d.product.name} — ${d.producer.producer}`;
        el.innerHTML = `
          <div class="pin-scale" style="--c:${d.producer.color}">
            <div class="leader"></div>
            <div class="pin-card">
              <img src="${d.product.imageUrl}" alt="${d.product.name}"
                   onerror="this.style.display='none'" />
            </div>
            <div class="pin-dot"></div>
          </div>`;
        el.onclick = () => {
          globe.pointOfView({ lat: d.producer.lat, lng: d.producer.lng, altitude: 0.3 }, 1200);
          selectProduct(d.producer, d.product);
        };
        d.el = el;
        return el;
      });

    globe.controls().autoRotate = false;
    // Centred south of Sweden's middle: the bottles all throw outward, and the southern
    // producers need room below the country to throw into.
    globe.pointOfView({ lat: 61.0, lng: 16.5, altitude: 0.44 }, 0);

    const HOME_ALT = 0.44;    // the altitude the marker sizes are drawn for
    const PIN_ALT = SURFACE;
    const PROBE = 0.9;        // degrees along the outward vector, just to read its screen angle

    let leadsResolved = false;

    // Aiming each cluster outward isn't enough on its own: Hällåkra and Klagshamn sit ~11px
    // apart on screen and both throw south, so their bottles would land on each other. Walk a
    // ladder of longer leaders and small angle nudges until each cluster finds clear air,
    // taking the header and jump bar as obstacles too. A whole cluster moves as one unit, so
    // a producer's bottles stay together. Resolved once, at the home view — clusters and the
    // gaps between stakes both scale with the zoom, so a clear layout stays clear.
    function resolveClusters(stakes) {
      const obstacles = ['header', '.jump'].map(s => document.querySelector(s).getBoundingClientRect());
      // Keep the bottles off the home marker too — it's the reference point, so it wants to
      // stay legible. Nynäshamn's stake is only ~23km away, close enough to matter.
      const h = globe.getScreenCoords(HOME.lat, HOME.lng, PIN_ALT);
      obstacles.push({ left: h.x - 26, right: h.x + 26, top: h.y - 18, bottom: h.y + 30 });
      const placed = [];
      const hits = (a, b) => Math.min(a.right, b.right) > Math.max(a.left, b.left) &&
                             Math.min(a.bottom, b.bottom) > Math.max(a.top, b.top);
      const boxAt = (s, ang, extra, c) => {
        const r = leadFor(s, c, ang, 1) + extra;
        const cx = s.x + Math.cos(ang) * r;
        const cy = s.y + Math.sin(ang) * r;
        return { left: cx - c.boxW / 2, right: cx + c.boxW / 2, top: cy - c.boxH / 2, bottom: cy + c.boxH / 2 };
      };
      // A longer leader is no good if it throws the bottle off the edge of the map.
      const onScreen = b => b.left > 8 && b.top > 8 && b.right < window.innerWidth - 8 && b.bottom < window.innerHeight - 8;

      // Would this candidate drop the cluster back onto the country? Rotate the geographic
      // heading by the same amount the screen angle was nudged (screen y runs down, so a
      // clockwise nudge on screen is a clockwise bearing), walk out the leader's length, and
      // ask the map. This is what lets the ladder rotate freely without beaching a bottle.
      const overWater = (s, c, nudge, extra) => {
        const d = (leadFor(s, c, s.ang + nudge, 1) + extra) / (s.pxPerDeg || 1);
        const gx = c.dir.x * Math.cos(nudge) + c.dir.y * Math.sin(nudge);
        const gy = -c.dir.x * Math.sin(nudge) + c.dir.y * Math.cos(nudge);
        const lat = c.lat + gy * d;
        const lng = c.lng + (gx * d) / Math.cos((lat * Math.PI) / 180);
        return !onLand(lng, lat);
      };

      // Rotating around the coast keeps a bottle hard against its own län; lengthening the
      // leader drags it out to sea. So try swinging along the shore first and only reach for a
      // longer leader once every angle is taken — otherwise Klagshamn, which collides with
      // Arilds along the same NNW line, gets flung 400km into the Kattegat.
      // The long tail matters on a landscape phone, where a squat viewport shrinks Sweden until
      // the stakes almost touch and no amount of rotating alone will separate the clusters.
      const LADDER = [
        [0, 0], [14, 0], [-14, 0], [28, 0], [-28, 0], [0, 14], [14, 14], [-14, 14],
        [42, 0], [-42, 0], [28, 16], [-28, 16], [56, 0], [-56, 0], [0, 34], [42, 20], [-42, 20],
        [70, 0], [-70, 0], [56, 24], [-56, 24], [0, 58], [90, 10], [-90, 10], [0, 88],
        [90, 40], [-90, 40], [0, 120], [60, 90], [-60, 90], [120, 40], [-120, 40], [0, 160]
      ];

      clusters.forEach((c, i) => {
        const s = stakes[i];
        let choice = null;
        let fallback = null;
        for (const [nudgeDeg, extra] of LADDER) {
          const nudge = (nudgeDeg * Math.PI) / 180;
          const box = boxAt(s, s.ang + nudge, extra, c);
          if (!onScreen(box)) continue;
          if (!overWater(s, c, nudge, extra)) continue;   // never beach a bottle
          if (!fallback) fallback = { nudge, extra, box };   // fits and is wet, may still clash
          if (![...placed, ...obstacles].some(b => hits(box, b))) {
            choice = { nudge, extra, box };
            break;
          }
        }
        choice = choice || fallback || { nudge: 0, extra: 0, box: boxAt(s, s.ang, 0, c) };
        c.extraLead = choice.extra;   // only what was needed on top of "just off the coast"
        c.nudge = choice.nudge;
        placed.push(choice.box);
      });
    }

    // Just far enough to clear the shore and stand the cluster off it: the distance to open
    // water, plus the cluster's own reach in that direction, plus a small gap. Because the
    // water distance is measured on screen it tracks the zoom by itself — the bottles stay
    // pinned just off their coast at every scale, with no separate spread factor.
    //
    // But only chase a coast the viewer can actually see. Zoom deep into an inland county —
    // Dalarna, where the Lazy Estate tea comes from — and the nearest water is far outside the
    // frame; hauling the bottle that way would strand it against the edge of a view with no
    // water and no border in it. So once the coast is further than we'd reach, ease the bottle
    // back in until it simply sits on the land beside its own county, which reads fine when
    // there's no shoreline on screen to respect. The ramp is continuous at the hand-over, so
    // bottles glide in as you zoom rather than snapping.
    const REACH_FRAC = 0.30;   // of the smaller screen edge: how far we'll go to find water
    function leadFor(s, c, ang, kSize) {
      const support = Math.abs(Math.cos(ang)) * (c.boxW / 2) * kSize +
                      Math.abs(Math.sin(ang)) * (c.boxH / 2) * kSize;
      const reach = Math.min(window.innerWidth, window.innerHeight) * REACH_FRAC;
      let clear = s.clearPx;
      if (clear > reach) {
        const over = (clear - reach) / reach;          // 0 at the hand-over, 1 when twice as far
        clear = reach * Math.max(0, 1 - over);         // ...by which point we've given up on water
      }
      return clear + support + GAP;
    }

    const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

    function placeMarkers() {
      const alt = globe.pointOfView().altitude;
      // How much the map has grown/shrunk versus the home view. Size and spread ride separate
      // curves on this so a zoomed-in county stays legible:
      //   spread grows FASTER than the map  -> bottles are flung past the county's edges
      //   size   grows SLOWER than the map   -> bottles take up less of the enlarged county
      const ratio = HOME_ALT / alt;
      // Only the bottles' size rides a curve now. The leader length comes from the measured
      // distance to water, which already scales with the zoom, so bottles hug their coast at
      // every scale instead of being flung outward by a separate factor.
      const kSize = clamp(Math.pow(ratio, 0.35), 0.78, 1.35);
      document.documentElement.style.setProperty('--ksize', kSize.toFixed(3));

      const stakes = clusters.map(c => {
        if (!c.pins.every(p => p.el)) return null;
        const stake = globe.getScreenCoords(c.lat, c.lng, PIN_ALT);
        const cosLat = Math.cos((c.lat * Math.PI) / 180) || 1;
        const at = deg => globe.getScreenCoords(
          c.lat + c.dir.y * deg,
          c.lng + (c.dir.x * deg) / cosLat,
          PIN_ALT
        );
        // Read the heading off the screen, so a cluster keeps pointing at its water even after
        // the globe is spun, and measure how far that water is in pixels at this zoom.
        const out = at(PROBE);
        const water = c.clearDeg > 0 ? at(c.clearDeg) : stake;
        return {
          x: stake.x,
          y: stake.y,
          ang: Math.atan2(out.y - stake.y, out.x - stake.x),
          clearPx: Math.hypot(water.x - stake.x, water.y - stake.y),
          pxPerDeg: Math.hypot(out.x - stake.x, out.y - stake.y) / PROBE
        };
      });

      if (!leadsResolved && stakes.every(Boolean)) {
        resolveClusters(stakes);
        leadsResolved = true;
      }

      clusters.forEach((c, i) => {
        const s = stakes[i];
        if (!s) return;
        const ang = s.ang + (c.nudge || 0);
        const r = leadFor(s, c, ang, kSize) + (c.extraLead || 0);   // just off its own shore
        let ax = Math.cos(ang) * r;                   // cluster centre, relative to the stake
        let ay = Math.sin(ang) * r;

        // The spread is measured in pixels, so on a phone a deep zoom throws whole clusters
        // off the edges and clips them. Where the stake itself is in view, keep its bottles in
        // view: hold the cluster inside the frame and let the leader stretch to wherever it
        // lands. Small screens then ring their bottles around the edge instead of losing them;
        // on a roomy desktop this never binds. Clusters whose stake is off-screen are left
        // alone, so a far-off producer isn't dragged into the frame by its leash.
        const halfW = (c.boxW / 2) * kSize + 6;
        const halfH = (c.boxH / 2) * kSize + 6;
        if (s.x > 0 && s.x < window.innerWidth && s.y > 0 && s.y < window.innerHeight) {
          ax = clamp(s.x + ax, halfW, window.innerWidth - halfW) - s.x;
          ay = clamp(s.y + ay, halfH, window.innerHeight - halfH) - s.y;
        }
        const leadR = Math.hypot(ax, ay);
        const leadA = Math.atan2(ay, ax);             // leader follows the cluster's real spot

        c.pins.forEach(p => {
          const st = p.el.style;
          // Grid slots scale with the bottles themselves, so the cluster stays packed at any zoom.
          st.setProperty('--dx', `${(ax + p.gx * kSize).toFixed(1)}px`);
          st.setProperty('--dy', `${(ay + p.gy * kSize).toFixed(1)}px`);
          st.setProperty('--a', `${((leadA * 180) / Math.PI).toFixed(2)}deg`);
          st.setProperty('--r', p.isLead ? `${leadR.toFixed(1)}px` : '0px');   // one leader per producer
        });
      });
    }

    let queued = false;
    function scheduleMarkers() {
      if (queued) return;
      queued = true;
      requestAnimationFrame(() => { queued = false; placeMarkers(); });
    }
    globe.controls().addEventListener('change', scheduleMarkers);
    window.addEventListener('resize', scheduleMarkers);

    // The globe builds the marker elements on its own schedule, and the camera never moves on
    // its own, so there's no first 'change' to lean on: wait for the elements, then place.
    (function whenMarkersExist() {
      if (pinData.every(d => d.el)) placeMarkers();
      else requestAnimationFrame(whenMarkersExist);
    })();

    // Porcelain, not photography: flatten the lighting so the pastels stay true instead of
    // falling into a hard day/night terminator.
    globe.lights().forEach(l => {
      if (l.type === 'AmbientLight') l.intensity = 4.4;
      if (l.type === 'DirectionalLight') { l.intensity = 0.75; l.position.set(1, 1, 1); }
    });

    paintGlobe();

    // Repaint the globe as a two-tone garden object: duck-egg water, linen land. three-globe
    // has already loaded the water mask as the globe texture, so redraw that image through a
    // canvas and hand the same texture its new picture.
    function paintGlobe() {
      const mat = globe.globeMaterial();
      const Color = mat.emissive.constructor;
      mat.color = new Color(SEA);   // fallback if the mask never arrives: a plain duck-egg sphere
      mat.shininess = 4;            // matte, like glazed earthenware
      mat.needsUpdate = true;

      globe.globeImageUrl('https://cdn.jsdelivr.net/npm/three-globe/example/img/earth-water.png');

      const ready = setInterval(() => {
        const tex = globe.globeMaterial().map;
        const img = tex && tex.image;
        if (!img || !img.width) return;
        clearInterval(ready);
        try {
          recolour(tex, img);
          globe.globeMaterial().color = new Color(0xffffff);
          globe.globeMaterial().needsUpdate = true;
        } catch (err) {
          // Tainted canvas or a mask we can't read: keep the flat duck-egg sphere.
          globe.globeMaterial().map = null;
          globe.globeMaterial().color = new Color(SEA);
          globe.globeMaterial().needsUpdate = true;
        }
      }, 120);
    }

    function recolour(tex, img) {
      const cv = document.createElement('canvas');
      cv.width = img.width;
      cv.height = img.height;
      const ctx = cv.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(img, 0, 0);
      const frame = ctx.getImageData(0, 0, cv.width, cv.height);
      const d = frame.data;

      const at = (lng, lat) => {
        const x = Math.round(((lng + 180) / 360) * cv.width);
        const y = Math.round(((90 - lat) / 180) * cv.height);
        return d[(y * cv.width + x) * 4];
      };
      // Don't assume which way the mask runs — ask it. Mid-Pacific is water; the Sahara isn't.
      const water = at(-140, 0);
      const earth = at(15, 23);
      if (Math.abs(water - earth) < 30) throw new Error('unreadable mask');
      const waterIsBright = water > earth;
      const mid = (water + earth) / 2;

      const rgb = hex => [1, 3, 5].map(i => parseInt(hex.slice(i, i + 2), 16));
      const sea = rgb(SEA);
      const land = rgb(LAND);

      for (let i = 0; i < d.length; i += 4) {
        const isSea = waterIsBright ? d[i] > mid : d[i] < mid;
        const c = isSea ? sea : land;
        d[i] = c[0];
        d[i + 1] = c[1];
        d[i + 2] = c[2];
        d[i + 3] = 255;
      }
      ctx.putImageData(frame, 0, 0);
      tex.image = cv;
      tex.needsUpdate = true;
    }

    // One route for every selection, whether the click came from a bottle on the map or a row
    // in the list, so the two can't disagree about what's picked.
    function selectProduct(producerObj, product) {
      showSidebarFor(producerObj, product);
      pinData.forEach(p => {
        if (p.el && !p.isHome) p.el.classList.toggle('is-active', p.product === product);
      });
    }

    function showSidebarFor(producerObj, activeProduct) {
      const sidebar = document.getElementById('infoSidebar');
      const content = document.getElementById('sidebarContent');
      const tint = producerObj.color + '26';   // 15% wash of the producer's own colour

      const products = producerObj.products.map(p => `
        <div class="product ${p === activeProduct ? 'is-active' : ''}">
          <img src="${p.imageUrl}" alt="${p.name}" onerror="this.style.display='none'" />
          <div class="product-body">
            <span class="kind" style="--tint:${tint}">${p.category}</span>
            <h3>${p.name}</h3>
            <div class="facts"><span>${p.price}</span><span>${p.volume}</span><span>${p.abv}</span></div>
            <p class="taste">${p.taste}</p>
            <div class="meta">
              <div><b>Pairs with</b> · ${p.suitable}</div>
              <div><b>Allergens</b> · ${p.allergens}</div>
            </div>
            <a class="link" href="${p.url}" target="_blank" rel="noopener">View on Systembolaget ↗</a>
          </div>
        </div>
      `).join('');

      content.innerHTML = `
        <div style="--seal:${producerObj.color}">
          <h2 class="producer-name">${producerObj.producer}</h2>
          <p class="producer-place">${producerObj.city} · ${producerObj.county}</p>
          <a class="link" href="${producerObj.website}" target="_blank" rel="noopener">Visit producer website ↗</a>
          <hr class="rule" />
          ${products}
        </div>
      `;

      // With a range to choose from, the rows themselves are the picker — clicking one selects
      // it just like clicking its bottle out on the map. A lone product is already the
      // selection, so it gets no pointer and no false affordance.
      if (producerObj.products.length > 1) {
        content.querySelectorAll('.product').forEach((row, i) => {
          const product = producerObj.products[i];
          row.classList.add('selectable');
          row.tabIndex = 0;
          row.setAttribute('role', 'button');
          row.setAttribute('aria-pressed', String(product === activeProduct));
          const pick = () => selectProduct(producerObj, product);
          row.addEventListener('click', pick);
          row.addEventListener('keydown', e => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); pick(); }
          });
        });
        // The Systembolaget link sits inside a selectable row: let it open the product page
        // instead of being swallowed as a selection.
        content.querySelectorAll('.product a').forEach(a =>
          a.addEventListener('click', e => e.stopPropagation()));
      }

      sidebar.classList.remove('hidden');
    }

    function closeSidebar() {
      document.getElementById('infoSidebar').classList.add('hidden');
      pinData.forEach(p => p.el && p.el.classList.remove('is-active'));
    }

    function focusProducer(producerName) {
      const match = mapData.find(d => d.producer === producerName);
      if (match) {
        globe.pointOfView({ lat: match.lat, lng: match.lng, altitude: 0.3 }, 1500);
        selectProduct(match, match.products[0]);
      }
    }
  </script>
</body>
</html>
